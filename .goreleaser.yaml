version: 2

project_name: ai-setup

before:
  hooks:
    - go mod tidy

builds:
  - id: ai-setup
    main: ./cmd/ai-setup
    binary: ai-setup
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - id: ai-setup
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: ISMARZDEV
    name: aispace-dev
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: ai-setup
    repository:
      owner: ISMARZDEV
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/ISMARZDEV/aispace-dev"
    description: "AI coding session manager — installs SDD, Engram, personas and MCP for Claude Code & OpenCode"
    license: "MIT"
    install: |
      bin.install "ai-setup"
    test: |
      system "#{bin}/ai-setup", "version"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge remote-tracking branch
